services:
  kontexta:
    image: safiyu/kontexta:dev-latest
    container_name: kontexta
    ports:
      - "8007:3000"
      - "8008:3001"
    volumes:
      - /home/safiyu/Homelab/kontexta:/app/data
      - /home/safiyu/Projects:/home/safiyu/Projects # Mount your projects directory here
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - WS_PORT=3001
      - KONTEXTA_WS_CLIENT_PORT=8008
      - KONTEXTA_WS_HOST=0.0.0.0
      - KONTEXTA_WS_ORIGINS=http://localhost:8007,http://127.0.0.1:8007
      - KONTEXTA_DATA_DIR=/app/data
      - KONTEXTA_DB_PATH=/app/data/kontexta.db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
