services:
  kontexta:
    build:
      context: .
      args:
        # Baked into the client bundle. Must match WS_PORT below.
        WS_PORT: "3001"
    container_name: kontexta
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./kontexta-data:/app/data
      # - /path/to/your/projects:/path/to/your/projects # Mount your projects directory here
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - WS_PORT=3001
      # Inside the container the WS server must listen on all interfaces so
      # the published port reaches it. The in-process default is 127.0.0.1.
      - KONTEXTA_WS_HOST=0.0.0.0
      # Origin allowlist for the (non-loopback) WS server. Browsers from
      # these origins can subscribe; everyone else is rejected. Add your
      # production hostname (e.g. https://kontexta.example.com) here.
      - KONTEXTA_WS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      # Optional: shared-secret token for WS auth (defends against raw
      # clients that spoof Origin). Generate with `openssl rand -hex 32`
      # and set both KONTEXTA_WS_TOKEN here AND NEXT_PUBLIC_WS_TOKEN as a
      # build arg so the client bundle includes it.
      # - KONTEXTA_WS_TOKEN=<generate-and-set>
      - KONTEXTA_DATA_DIR=/app/data
      - KONTEXTA_DB_PATH=/app/data/kontexta.db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
