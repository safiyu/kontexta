# docker-compose.hub.yml
# Uses the pre-built image from Docker Hub — no build step required.
# Pull and run in one command:
#
#   curl -fsSL https://raw.githubusercontent.com/safiyu/kontexta/main/docker-compose.hub.yml | docker compose -f - up -d
#
# Or, if you have the file locally:
#
#   docker compose -f docker-compose.hub.yml up -d
#
# Data is persisted in ./kontexta-data on the host.
#
# Environment variables (override as needed):
#   HOST_PORT    — Host port for the web app (default: 3000)
#   WS_HOST_PORT — Host port for the WebSocket (default: 3001)
#   WS_ORIGINS   — Comma-separated list of allowed origins (default: localhost)
#   DATA_DIR     — Host path for persistent data (defaults to ./kontexta-data)
#   PROJECT_DIR  — Host path to mount your projects (defaults to ./projects)
#
# Examples:
#   # Default (localhost dev):
#     docker compose -f docker-compose.hub.yml up -d
#
#   # Production:
#     HOST_PORT=80 WS_HOST_PORT=443 \
#     WS_ORIGINS="https://kontexta.example.com" \
#     docker compose -f docker-compose.hub.yml up -d

services:
  kontexta:
    image: safiyu/kontexta:latest
    container_name: kontexta
    ports:
      - "${HOST_PORT:-3000}:3000"
      - "${WS_HOST_PORT:-3001}:3001"
    volumes:
      - "${DATA_DIR:-./kontexta-data}:/app/data"
      # Mount your projects directory. By default the container exposes it at /projects
      # IMPORTANT: mount the project directory to the same absolute path
      # on the host and inside the container so on-disk paths remain stable.
      - "${PROJECT_DIR}:${PROJECT_DIR}"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - WS_PORT=3001
      - KONTEXTA_WS_HOST=0.0.0.0
      - KONTEXTA_WS_ORIGINS=${WS_ORIGINS:-http://localhost:${HOST_PORT:-3000},http://127.0.0.1:${HOST_PORT:-3000}}
      - KONTEXTA_WS_CLIENT_PORT=${WS_HOST_PORT:-3001}
      - KONTEXTA_DATA_DIR=/app/data
      - KONTEXTA_DB_PATH=/app/data/kontexta.db
      # Host path for the data directory — used by the web UI to generate
      # correct volume-mount strings in install snippets (e.g. -v /home/user/data:/app/data).
      - KONTEXTA_HOST_DATA_DIR=${DATA_DIR:-./kontexta-data}
      # Optional: expose where projects are mounted inside the container
      - KONTEXTA_PROJECTS_ROOT=${PROJECT_DIR}
    entrypoint: ["/bin/sh", "-c", "if [ -z \"$PROJECT_DIR\" ]; then echo 'ERROR: PROJECT_DIR is not set. Set PROJECT_DIR to an absolute host path before running docker compose.' >&2; exit 1; fi; exec node apps/web/server.js"]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
