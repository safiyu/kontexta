name: Test PR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.3"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends python3 make g++ gcc

      - name: Install
        env:
          npm_config_build_from_source: "true"
        run: pnpm install --frozen-lockfile

      - name: Rebuild better-sqlite3 from source
        run: pnpm rebuild better-sqlite3 --build-from-source

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test
